---
layout: default
---

{%- include github_widget.html -%}

{%- if site.posts.size > 0 -%}
<section class="section">
  <div class="container">
    <h1 class="title is-3">Обновления</h1>
    <hr />
    <div class="columns is-multiline">
      {%- for post in site.posts -%}
      <div class="column is-one-third">
        <div class="card">
          <div class="card-image">
            <div class="image is-4by2">
              {%- if post.image -%}
              <img src="{{ post.image }}" alt="{{ post.title | escape }}" />
              {%- endif -%}
              
              {%- if post.image == null -%}
              <img
                src="/assets/img/post-without-image.svg"
                alt="{{ post.title | escape }}"
              />
              {%- endif -%}
            </div>
          </div>
          <footer class="card-footer">
            <a href="{{ post.url | relative_url }}" class="card-footer-item">Читать</a>
          </footer>
        </div>
      </div>
      {%- endfor -%}
    </div>
  </div>
  <div class="columns is-centered mt-5">
    <div class="column is-one-fifth">
      <a href="{{ "/feed.xml" | relative_url }}" class="is-fullwidth button is-info is-primary">Подписка на RSS</a>
    </div>
  </div>
</section>
{%- endif -%}
