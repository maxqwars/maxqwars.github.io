---
layout: default
---
<section class="section">
  <div class="block">
    <div class="container">
      <div class="has-text-centered">
        <h1 class="title" id="typing">{{ page.title | escape }}</h1>
        <br>
        {%- assign date_format = site.minima.date_format | default: "%b %-d, %Y" -%}
        <h5 class="subtitle">{{ page.date | date: date_format }}</h5>
      </div>
    </div>
  </div>
</section>

<section class="section">
  <div class="container">
    <div class="columns">
      <div class="column">
        <article class="content">{{ content }}</article>
      </div>
    </div>
  </div>
</section>
