<!-- BLOG POSTS -->
<section class="section">
  <div class="container">
    {%- if site.posts.size > 0 -%}
    <!-- If there are posts in the blog -->
    <p class="title is-family-secondary is-3">Последние обновления</p>
    <hr />
    <div class="columns is-multiline">
      {%- for post in site.posts limit:6 -%}
      <div class="column is-one-third-desktop is-half-tablet">
        {%- include post_card.html -%}
      </div>
      {%- endfor -%}
    {%- endif -%}
    
    {%- if site.posts.size == 0 -%}
    <!-- If there are no posts in the blog -->
    <div class="has-text-centered">
      <h3 class="title is-3">Пусто...</h3>
      <h5 class="subtitle is-5">Но что-то обязательно появится</h5>
    </div>
    {%- endif -%}
  </div>
</section>
